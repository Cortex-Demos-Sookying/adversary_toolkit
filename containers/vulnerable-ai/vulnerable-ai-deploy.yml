apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${CONTAINER_NAME}
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${CONTAINER_NAME}
  template:
    metadata:
      labels:
        app: ${CONTAINER_NAME}
    spec:
      containers:
      # Container 1: The custom image built by your GitHub Action
      - name: web-app
        image: ${CONTAINER_IMAGE}
        ports:
        - containerPort: 5000
        env:
        - name: LLM_API_BASE
          value: "http://localhost:11434/v1" # Communicates with the sidecar over localhost
      
      # Container 2: The Ollama Sidecar (pulled directly from Docker Hub)
      - name: ollama-sidecar
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434

---
apiVersion: v1
kind: Service
metadata:
  name: ${CONTAINER_NAME}-svc
  namespace: default
spec:
  selector:
    app: ${CONTAINER_NAME}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
